<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runcard</title>
    <link rel="icon" href="data:,">
    <style>
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
    <style>
        .date-container {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 32px;
        }

        input[type="date"] {
            background: none;
            width: 100%;
            height: 100%;
            color: transparent;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            opacity: 1;
            cursor: pointer;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            font-size: 24px;
            position: absolute;
            left: 0;
            right: 0;
            margin: auto;
        }

        input[type="date"]::-moz-focus-inner {
            border: 0;
        }

        input[type="date"]:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="column-1">
                <div class="column-1-row-1">
                    <form method="get" id="date-form">
                        <div class="date-container">
                            {{ date_form.as_p }}
                        </div>
                    </form>
                    {% if selected_date %}
                        <p>{{ selected_date }}</p>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
    <script>
        document.querySelector('input[type="date"]').addEventListener('change', function() {
            document.getElementById('date-form').submit();
        });
    </script>
</body>
</html>
